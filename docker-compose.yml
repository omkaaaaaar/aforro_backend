version: "3.9"

services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aforro_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

  redis:
    image: redis:7

    ports:
      - "6379:6379"

  web:
    build: .

    command: >
      sh -c " python manage.py migrate && python manage.py runserver 0.0.0.0:8000 "

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      - db
      - redis

  celery:
    build: .

    command: celery -A config worker -l info

    volumes:
      - .:/app

    depends_on:
      - db
      - redis
